<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TT Lobby - Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f172a; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #toolbar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 9999;
      background: rgba(15, 23, 42, 0.95); border-bottom: 1px solid rgba(99, 102, 241, 0.3);
      backdrop-filter: blur(12px); padding: 12px 20px;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 12px;
    }
    .left-section { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
    .right-section { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
    .logo { font-size: 18px; font-weight: bold; background: linear-gradient(135deg, #818cf8, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .client-selector { display: flex; gap: 6px; }
    .client-btn {
      padding: 6px 12px; border: 1px solid #334155; border-radius: 6px;
      font-size: 12px; cursor: pointer; transition: all 0.2s;
      background: #1e293b; color: #cbd5e1;
    }
    .client-btn:hover { background: #334155; }
    .client-btn.active { background: #6366f1; border-color: #6366f1; color: white; }
    .lobby-selector { display: flex; gap: 8px; }
    .lobby-btn {
      padding: 8px 16px; border: none; border-radius: 8px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all 0.25s; display: flex; align-items: center; gap: 8px;
    }
    .lobby-btn-0 { background: linear-gradient(135deg, #22c55e, #16a34a); color: white; }
    .lobby-btn-0:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4); }
    .lobby-btn-1 { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
    .lobby-btn-1:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4); }
    .lobby-btn-2 { background: linear-gradient(135deg, #eab308, #ca8a04); color: white; }
    .lobby-btn-2:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(234, 179, 8, 0.4); }
    .lobby-btn.active { border: 2px solid white; box-shadow: 0 0 20px rgba(255, 255, 255, 0.3); }
    #status { font-size: 12px; color: #94a3b8; }
    #status.success { color: #22c55e; }
    #status.error { color: #ef4444; }
    #status.info { color: #3b82f6; }
    #game-container { width: 100vw; height: 100vh; padding-top: 60px; }
    #game-container iframe { width: 100%; height: calc(100% - 60px); border: none; }
    #injection-modal {
      position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
      z-index: 10000; background: rgba(15, 23, 42, 0.98);
      border: 1px solid rgba(99, 102, 241, 0.5); border-radius: 16px;
      padding: 24px; min-width: 320px; max-width: 90vw;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(12px);
    }
    #injection-modal.hidden { display: none; }
    #injection-modal h3 { color: #818cf8; margin-bottom: 16px; font-size: 16px; text-align: center; }
    #injection-modal p { color: #94a3b8; font-size: 13px; line-height: 1.6; margin-bottom: 12px; }
    #injection-modal .code-block {
      background: #0f172a; border: 1px solid #334155; border-radius: 8px;
      padding: 12px; font-family: 'Consolas', 'Monaco', monospace;
      font-size: 11px; color: #22c55e; word-break: break-all;
      margin-bottom: 16px; cursor: pointer;
    }
    #injection-modal .code-block:hover { background: #1e293b; }
    #injection-modal button {
      width: 100%; padding: 12px; border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white; transition: all 0.2s;
    }
    #injection-modal button:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(99, 102, 241, 0.4); }
    #injection-modal .hint { font-size: 11px; color: #64748b; text-align: center; margin-top: 8px; }
  </style>
</head>
<body>
  <div id="toolbar">
    <div class="left-section">
      <div class="logo">🎮 TT Lobby</div>
      <div class="client-selector">
        <button class="client-btn active" data-client="official">官方</button>
        <button class="client-btn" data-client="fxclient">FX</button>
      </div>
    </div>
    <div class="right-section">
      <div class="lobby-selector">
        <button class="lobby-btn lobby-btn-0" data-lobby="0">🟢 Lobby 0</button>
        <button class="lobby-btn lobby-btn-1" data-lobby="1">🔴 Lobby 1</button>
        <button class="lobby-btn lobby-btn-2" data-lobby="2">🟡 Lobby 2</button>
      </div>
      <div id="status">点击大厅按钮开始</div>
    </div>
  </div>

  <div id="injection-modal">
    <h3>📋 需要手动注入脚本</h3>
    <p>由于浏览器安全限制，无法自动注入脚本到游戏页面。请按照以下步骤操作：</p>
    <div class="code-block" id="script-code">// 点击此处复制脚本，然后在游戏页面按 F12 粘贴到控制台</div>
    <button id="copy-btn">复制脚本</button>
    <p class="hint">复制后，切换到游戏页面 → 按 F12 → 粘贴到控制台 → 按回车</p>
  </div>

  <div id="game-container">
    <iframe id="game-iframe" sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-presentation"></iframe>
  </div>

  <script>
    const servers = ['territorial.io', '1.territorial.io', '2.territorial.io'];
    const clients = {
      official: 'https://territorial.io',
      fxclient: 'https://fxclient.github.io/FXclient'
    };
    
    const params = new URLSearchParams(window.location.search);
    let selectedLobby = parseInt(params.get('lobby')) || 1;
    let selectedClient = params.get('client') || 'official';
    
    const iframe = document.getElementById('game-iframe');
    const statusEl = document.getElementById('status');
    const modal = document.getElementById('injection-modal');
    const scriptCodeEl = document.getElementById('script-code');
    const copyBtn = document.getElementById('copy-btn');
    const lobbyButtons = document.querySelectorAll('.lobby-btn');
    const clientButtons = document.querySelectorAll('.client-btn');

    function generateScript(lobbyId) {
      return `(function(){const l=${lobbyId},s=['territorial.io','1.territorial.io','2.territorial.io'];const o=WebSocket;WebSocket=function(u,p){let t=u;try{const r=new URL(u);if(r.hostname.includes('territorial.io')){r.hostname=s[l];t=r.toString()}}catch(e){}return new o(t,p)};window.ttLobbyId=l;console.log('[TT Lobby] Connected to Lobby',l);alert('✓ 已切换到 Lobby '+l+'！请点击 Multiplayer 进入游戏');})();`;
    }

    function updateActiveButtons() {
      lobbyButtons.forEach(btn => {
        const lobbyId = parseInt(btn.dataset.lobby);
        btn.classList.toggle('active', lobbyId === selectedLobby);
      });
      clientButtons.forEach(btn => {
        const clientId = btn.dataset.client;
        btn.classList.toggle('active', clientId === selectedClient);
      });
      scriptCodeEl.textContent = generateScript(selectedLobby);
    }

    function reloadGame() {
      statusEl.textContent = '正在加载游戏...';
      statusEl.className = 'info';
      iframe.src = clients[selectedClient];
      setTimeout(() => {
        modal.classList.remove('hidden');
        statusEl.textContent = '请手动注入脚本';
        statusEl.className = '';
      }, 3000);
    }

    lobbyButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        selectedLobby = parseInt(btn.dataset.lobby);
        updateActiveButtons();
        statusEl.textContent = `已选择 Lobby ${selectedLobby}`;
        statusEl.className = 'success';
        setTimeout(() => { statusEl.className = ''; }, 2000);
      });
    });

    clientButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        selectedClient = btn.dataset.client;
        updateActiveButtons();
        reloadGame();
      });
    });

    copyBtn.addEventListener('click', () => {
      const script = generateScript(selectedLobby);
      navigator.clipboard.writeText(script).then(() => {
        copyBtn.textContent = '✓ 已复制！';
        copyBtn.style.background = 'linear-gradient(135deg, #22c55e, #16a34a)';
        setTimeout(() => {
          copyBtn.textContent = '复制脚本';
          copyBtn.style.background = '';
        }, 2000);
      });
    });

    scriptCodeEl.addEventListener('click', () => {
      const script = generateScript(selectedLobby);
      navigator.clipboard.writeText(script);
      scriptCodeEl.textContent = '✓ 已复制！';
      scriptCodeEl.style.color = '#22c55e';
      setTimeout(() => {
        scriptCodeEl.textContent = generateScript(selectedLobby);
        scriptCodeEl.style.color = '';
      }, 2000);
    });

    updateActiveButtons();
    iframe.src = clients[selectedClient];
    setTimeout(() => {
      modal.classList.remove('hidden');
    }, 3000);
  </script>
</body>
</html>
