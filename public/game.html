<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TT Lobby - Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      background: #0f172a;
      overflow: hidden;
    }
    #lobby-selector {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 9999;
      background: rgba(15, 23, 42, 0.9);
      border: 1px solid rgba(99, 102, 241, 0.5);
      border-radius: 12px;
      padding: 16px;
      min-width: 200px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(10px);
    }
    #lobby-selector h3 {
      color: #818cf8;
      margin-bottom: 12px;
      font-size: 14px;
      text-align: center;
    }
    .lobby-buttons {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .lobby-btn {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .lobby-btn-0 {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      color: white;
    }
    .lobby-btn-0:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(34, 197, 94, 0.4);
    }
    .lobby-btn-1 {
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
    }
    .lobby-btn-1:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(239, 68, 68, 0.4);
    }
    .lobby-btn-2 {
      background: linear-gradient(135deg, #eab308, #ca8a04);
      color: white;
    }
    .lobby-btn-2:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(234, 179, 8, 0.4);
    }
    .lobby-btn.active {
      border: 2px solid white;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
    }
    #status {
      margin-top: 12px;
      text-align: center;
      font-size: 11px;
      color: #94a3b8;
    }
    #status.success {
      color: #22c55e;
    }
    #status.error {
      color: #ef4444;
    }
    #game-container {
      width: 100vw;
      height: 100vh;
      position: relative;
    }
    #game-container iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    #loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #0f172a;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 10000;
      transition: opacity 0.5s;
    }
    #loader.hidden {
      opacity: 0;
      pointer-events: none;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid rgba(99, 102, 241, 0.3);
      border-top-color: #818cf8;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    #loader p {
      margin-top: 20px;
      color: #94a3b8;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div id="loader">
    <div class="spinner"></div>
    <p>正在加载游戏...</p>
  </div>

  <div id="lobby-selector">
    <h3>🎮 选择大厅</h3>
    <div class="lobby-buttons">
      <button class="lobby-btn lobby-btn-0" data-lobby="0">🟢 Lobby 0</button>
      <button class="lobby-btn lobby-btn-1" data-lobby="1">🔴 Lobby 1</button>
      <button class="lobby-btn lobby-btn-2" data-lobby="2">🟡 Lobby 2</button>
    </div>
    <div id="status">脚本已注入</div>
  </div>

  <div id="game-container">
    <iframe src="https://territorial.io" sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-presentation"></iframe>
  </div>

  <script>
    const servers = ['territorial.io', '1.territorial.io', '2.territorial.io'];
    let selectedLobby = parseInt(new URLSearchParams(window.location.search).get('lobby')) || 1;
    const iframe = document.querySelector('iframe');
    const statusEl = document.getElementById('status');
    const loader = document.getElementById('loader');
    const buttons = document.querySelectorAll('.lobby-btn');

    function updateActiveButton() {
      buttons.forEach(btn => {
        const lobbyId = parseInt(btn.dataset.lobby);
        if (lobbyId === selectedLobby) {
          btn.classList.add('active');
        } else {
          btn.classList.remove('active');
        }
      });
    }

    function injectScript(lobbyId) {
      selectedLobby = lobbyId;
      updateActiveButton();
      
      const scriptCode = `
        (function() {
          const lobbyId = ${lobbyId};
          const servers = ['territorial.io', '1.territorial.io', '2.territorial.io'];
          
          console.log('[TT Lobby] Injecting for Lobby', lobbyId);
          
          const originalWebSocket = window.WebSocket;
          window.WebSocket = function(url, protocols) {
            let targetUrl = url;
            try {
              const parsedUrl = new URL(url);
              if (parsedUrl.hostname.includes('territorial.io')) {
                parsedUrl.hostname = servers[lobbyId];
                targetUrl = parsedUrl.toString();
                console.log('[TT Lobby] WebSocket redirected to:', targetUrl);
              }
            } catch(e) {}
            return new originalWebSocket(targetUrl, protocols);
          };
          
          window.ttLobbyId = lobbyId;
          console.log('[TT Lobby] Script injected successfully!');
        })();
      `;

      try {
        const blob = new Blob([scriptCode], { type: 'application/javascript' });
        const url = URL.createObjectURL(blob);
        
        const script = document.createElement('script');
        script.src = url;
        script.onload = () => {
          URL.revokeObjectURL(url);
          statusEl.textContent = `已切换到 Lobby ${lobbyId}`;
          statusEl.className = 'success';
          setTimeout(() => {
            statusEl.className = '';
          }, 3000);
        };
        script.onerror = () => {
          URL.revokeObjectURL(url);
          statusEl.textContent = '注入失败，请刷新';
          statusEl.className = 'error';
        };

        iframe.contentDocument.head.appendChild(script);
      } catch (error) {
        console.error('[TT Lobby] Injection error:', error);
        statusEl.textContent = '注入失败: ' + error.message;
        statusEl.className = 'error';
      }
    }

    buttons.forEach(btn => {
      btn.addEventListener('click', () => {
        const lobbyId = parseInt(btn.dataset.lobby);
        injectScript(lobbyId);
      });
    });

    iframe.addEventListener('load', () => {
      loader.classList.add('hidden');
      setTimeout(() => {
        injectScript(selectedLobby);
      }, 1000);
    });

    updateActiveButton();
  </script>
</body>
</html>
