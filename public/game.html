<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TT Lobby - Game</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f172a; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    #lobby-selector {
      position: fixed; top: 20px; right: 20px; z-index: 9999;
      background: rgba(15, 23, 42, 0.95); border: 1px solid rgba(99, 102, 241, 0.5);
      border-radius: 16px; padding: 20px; min-width: 220px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      backdrop-filter: blur(12px);
    }
    #lobby-selector h3 { color: #818cf8; margin-bottom: 12px; font-size: 14px; text-align: center; }
    .client-selector { margin-bottom: 12px; }
    .client-selector label { display: block; margin-bottom: 6px; font-size: 11px; color: #94a3b8; text-align: center; }
    .client-buttons { display: flex; gap: 6px; }
    .client-btn {
      flex: 1; padding: 6px 8px; border: 1px solid #334155; border-radius: 6px;
      font-size: 11px; cursor: pointer; transition: all 0.2s;
      background: #1e293b; color: #cbd5e1;
    }
    .client-btn:hover { background: #334155; }
    .client-btn.active { background: #6366f1; border-color: #6366f1; color: white; }
    .lobby-buttons { display: flex; flex-direction: column; gap: 8px; }
    .lobby-btn {
      padding: 12px 16px; border: none; border-radius: 10px;
      font-size: 13px; font-weight: 600; cursor: pointer;
      transition: all 0.25s; display: flex; align-items: center; gap: 10px;
    }
    .lobby-btn-0 { background: linear-gradient(135deg, #22c55e, #16a34a); color: white; }
    .lobby-btn-0:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4); }
    .lobby-btn-1 { background: linear-gradient(135deg, #ef4444, #dc2626); color: white; }
    .lobby-btn-1:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(239, 68, 68, 0.4); }
    .lobby-btn-2 { background: linear-gradient(135deg, #eab308, #ca8a04); color: white; }
    .lobby-btn-2:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(234, 179, 8, 0.4); }
    .lobby-btn.active { border: 2px solid white; box-shadow: 0 0 20px rgba(255, 255, 255, 0.3); }
    #status {
      margin-top: 14px; text-align: center; font-size: 12px; color: #94a3b8;
      min-height: 16px;
    }
    #status.success { color: #22c55e; }
    #status.error { color: #ef4444; }
    #game-container { width: 100vw; height: 100vh; position: relative; }
    #game-container iframe { width: 100%; height: 100%; border: none; }
    #loader {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #0f172a; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 10000;
      transition: opacity 0.5s;
    }
    #loader.hidden { opacity: 0; pointer-events: none; }
    .spinner {
      width: 48px; height: 48px; border: 4px solid rgba(99, 102, 241, 0.2);
      border-top-color: #818cf8; border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loader p { margin-top: 24px; color: #94a3b8; font-size: 15px; }
    #loader .subtitle { margin-top: 8px; font-size: 12px; color: #64748b; }
  </style>
</head>
<body>
  <div id="loader">
    <div class="spinner"></div>
    <p>正在加载游戏...</p>
    <p class="subtitle">脚本注入中，请稍候</p>
  </div>

  <div id="lobby-selector">
    <h3>🎮 大厅管理</h3>
    
    <div class="client-selector">
      <label>选择客户端</label>
      <div class="client-buttons">
        <button class="client-btn active" data-client="official">官方</button>
        <button class="client-btn" data-client="fxclient">FX</button>
      </div>
    </div>

    <div class="lobby-buttons">
      <button class="lobby-btn lobby-btn-0" data-lobby="0">🟢 Lobby 0</button>
      <button class="lobby-btn lobby-btn-1" data-lobby="1">🔴 Lobby 1</button>
      <button class="lobby-btn lobby-btn-2" data-lobby="2">🟡 Lobby 2</button>
    </div>
    
    <div id="status">正在注入脚本...</div>
  </div>

  <div id="game-container">
    <iframe id="game-iframe" sandbox="allow-scripts allow-same-origin allow-popups allow-forms allow-presentation"></iframe>
  </div>

  <script>
    const servers = ['territorial.io', '1.territorial.io', '2.territorial.io'];
    const clients = {
      official: 'https://territorial.io',
      fxclient: 'https://fxclient.github.io/FXclient'
    };
    
    const params = new URLSearchParams(window.location.search);
    let selectedLobby = parseInt(params.get('lobby')) || 1;
    let selectedClient = params.get('client') || 'official';
    
    const iframe = document.getElementById('game-iframe');
    const statusEl = document.getElementById('status');
    const loader = document.getElementById('loader');
    const lobbyButtons = document.querySelectorAll('.lobby-btn');
    const clientButtons = document.querySelectorAll('.client-btn');

    function updateActiveButtons() {
      lobbyButtons.forEach(btn => {
        const lobbyId = parseInt(btn.dataset.lobby);
        btn.classList.toggle('active', lobbyId === selectedLobby);
      });
      clientButtons.forEach(btn => {
        const clientId = btn.dataset.client;
        btn.classList.toggle('active', clientId === selectedClient);
      });
    }

    function injectScript(lobbyId) {
      selectedLobby = lobbyId;
      updateActiveButtons();
      
      try {
        const blob = new Blob([`
          (function() {
            const lobbyId = ${lobbyId};
            const servers = ['territorial.io', '1.territorial.io', '2.territorial.io'];
            
            console.log('[TT Lobby] Script injected for Lobby', lobbyId);
            
            const originalWebSocket = window.WebSocket;
            window.WebSocket = function(url, protocols) {
              let targetUrl = url;
              try {
                const parsedUrl = new URL(url);
                if (parsedUrl.hostname.includes('territorial.io')) {
                  parsedUrl.hostname = servers[lobbyId];
                  targetUrl = parsedUrl.toString();
                  console.log('[TT Lobby] WebSocket redirected to:', targetUrl);
                }
              } catch(e) {}
              return new originalWebSocket(targetUrl, protocols);
            };
            
            window.ttLobbyId = lobbyId;
            window.dispatchEvent(new CustomEvent('tt-lobby-injected', { detail: { lobbyId } }));
            console.log('[TT Lobby] Script loaded successfully!');
          })();
        `], { type: 'application/javascript' });
        
        const url = URL.createObjectURL(blob);
        const script = document.createElement('script');
        script.src = url;
        script.onload = () => {
          URL.revokeObjectURL(url);
          statusEl.textContent = `已切换到 Lobby ${lobbyId}`;
          statusEl.className = 'success';
          setTimeout(() => { statusEl.className = ''; }, 3000);
        };
        script.onerror = () => {
          URL.revokeObjectURL(url);
          statusEl.textContent = '注入失败，请重试';
          statusEl.className = 'error';
        };

        if (iframe.contentDocument && iframe.contentDocument.head) {
          iframe.contentDocument.head.appendChild(script);
        } else {
          throw new Error('Cannot access iframe document');
        }
      } catch (error) {
        console.error('[TT Lobby] Injection error:', error);
        statusEl.textContent = '注入失败，请手动刷新';
        statusEl.className = 'error';
      }
    }

    function reloadGame() {
      loader.classList.remove('hidden');
      iframe.src = clients[selectedClient];
    }

    lobbyButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        const lobbyId = parseInt(btn.dataset.lobby);
        injectScript(lobbyId);
      });
    });

    clientButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        selectedClient = btn.dataset.client;
        updateActiveButtons();
        reloadGame();
      });
    });

    iframe.addEventListener('load', () => {
      loader.classList.add('hidden');
      setTimeout(() => {
        injectScript(selectedLobby);
      }, 1500);
    });

    updateActiveButtons();
    iframe.src = clients[selectedClient];
  </script>
</body>
</html>
